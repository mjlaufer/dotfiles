set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB,tmux-256color:RGB'
# set -g default-terminal 'xterm-kitty'

# Address vim mode-switching delay
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# Refresh `status-left` and `status-right` more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Mouse support (drag pane borders to resize, click to select, scroll)
set -g mouse on

# Allow programs to pass escape sequences through tmux (needed for Yazi's kitty-graphics-protocol
# image previews inside a tmux session).
set -g allow-passthrough on

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Status line colors
set -g status-style 'bg=default fg=green'

# Status left: session name in an accent block
set -g status-left '#[fg=black,bg=green,bold] #S #[default] '
set -g status-left-length 30

# Window tabs: index + name, current highlighted, zoom flag, vertical separators
set -g window-status-format ' #I #W '
set -g window-status-current-format '#[fg=black,bg=green,bold] #I #W#{?window_zoomed_flag, ,} #[default]'
set -g window-status-separator '#[fg=green]│#[default]'

# Status right: state badges that appear only when that state is active.
set -g status-right '#{?pane_synchronized,#[fg=black#,bg=red#,bold] SYNC #[default] ,}#{?pane_in_mode,#[fg=black#,bg=blue#,bold] COPY #[default] ,}#{?client_prefix,#[fg=black#,bg=green#,bold] PREFIX #[default] ,}'
set -g status-right-length 40

# Map reload command
bind C-a source-file ~/dotfiles/tmux/.tmux.conf \; display-message "tmux config reloaded."

# Prefix
set -g prefix C-Space

# Use one-based indexes
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# Show tmux window titles in native tab and window titles
set -g set-titles on
set -g set-titles-string '#T'

# Vim key bindings
set -g status-keys vi

# Use Vim keys for copy/paste
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# vim-like window/pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Open new panes and windows in current directory.
bind c new-window -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'

# cht
bind -r i run-shell "tmux neww tmux-cht"

# Automatic session restore on startup
set -g @continuum-restore 'on'

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Run tmux Plugin Manager
run '~/.tmux/plugins/tpm/tpm'
